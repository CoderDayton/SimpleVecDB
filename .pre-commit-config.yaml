repos:
  - repo: local
    hooks:
      - id: version-sync
        name: version sync check
        entry: python3 scripts/check_version_sync.py
        language: system
        files: ^(pyproject\.toml|src/simplevecdb/__init__\.py)$
        pass_filenames: false

      - id: ruff
        name: ruff
        entry: uv run ruff check . --fix
        language: system
        types: [python]
        pass_filenames: false

      - id: mypy
        name: mypy
        entry: uv run mypy .
        language: system
        types: [python]
        pass_filenames: false

      - id: bandit
        name: bandit
        entry: uv run bandit -r src/ -ll -c .bandit
        language: system
        types: [python]
        pass_filenames: false

      - id: pytest-cov
        name: pytest coverage
        entry: uv run pytest tests/ -vv --cov=src/simplevecdb
        language: system
        types: [python]
        pass_filenames: false
